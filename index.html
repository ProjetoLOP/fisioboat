<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Fisioboat</title>

        <!-- Script de Configuração do Aframe -->
        <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>

        <!-- Script -->
        <script src="./script.js"></script>
    </head>
    <body>
        <a-scene>
            <!-- Skybox -->
            <a-sky color="#87CEEB"></a-sky>

            <!-- Chão -->
            <a-plane position="0 0 -5" rotation="-90 0 0" width="20" height="20" color="#1E90FF"></a-plane>

            <!-- Objeto do Barco -->
            <a-entity gltf-model="./Assets/Boat/Boat.gltf"  rotation="0 180 0" boat-controls></a-entity>
        </a-scene>
    </body>
</html>
