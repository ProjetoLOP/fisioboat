<!DOCTYPE html>
<a-box position="0 0.5 -5" depth="2" height="0.5" width="1" color="#8B4513" boat-controls></a-box>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Fisioboat</title>
        <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
        <script>
            AFRAME.registerComponent('boat-controls', {
                init: function () {
                    window.addEventListener('keydown', (event) => {
                        const position = this.el.getAttribute('position');
                        switch (event.key) {
                            case ' ':
                                position.z -= 0.1;
                                break;
                        }
                        this.el.setAttribute('position', position);
                    });
                }
            });
        </script>
    </head>
    <body>
        <a-scene>
            <!-- Skybox -->
            <a-sky color="#87CEEB"></a-sky>

            <!-- Chão -->
            <a-plane position="0 0 -5" rotation="-90 0 0" width="20" height="20" color="#1E90FF"></a-plane>

            <!-- Objeto do Barco -->
            <a-box position="0 0.5 -5" depth="2" height="0.5" width="1" color="#8B4513" boat-controls></a-box>
            <a-cylinder position="0 1 -5" radius="0.05" height="1" color="#8B4513" boat-controls></a-cylinder>
            <a-plane position="0 1.5 -5" rotation="0 0 90" width="1" height="0.5" color="#FFFFFF" boat-controls></a-plane>
        </a-scene>
    </body>
</html>
